name: Publish Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional publish version (for example 0.1.2 or v0.1.2)
        required: false
        type: string
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Update npm
        run: npm install -g npm@latest
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Resolve publish version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${INPUT_VERSION#v}"

          if [ -n "${VERSION}" ]; then
            echo "version source: workflow input"
          else
            VERSION="${TAG_NAME#v}"
          fi

          if [ -n "${VERSION}" ] && [ -z "${INPUT_VERSION}" ]; then
            echo "version source: release tag"
            echo "release tag: ${TAG_NAME}"
          fi

          if [ -z "${VERSION}" ]; then
            VERSION="$(npm pkg get version | tr -d '"')"
            echo "version source: package.json"
            echo "release tag: <none>"
            echo "fallback to package.json version"
          fi

          echo "publish version: ${VERSION}"
          node -e 'const v=process.argv[1]; if(!/^\d+\.\d+\.\d+([.-].+)?$/.test(v)){console.error(`Invalid version: ${v}`); process.exit(1)}' "${VERSION}"
          npm version --no-git-tag-version "${VERSION}"
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
